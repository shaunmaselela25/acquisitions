name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: postgres://test:test@localhost:5432/acquisitions_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 30
          if-no-files-found: warn

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report generated and uploaded as artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Coverage report not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Annotate test failures
        if: failure()
        run: |
          echo "::error title=Tests failed::Run npm test locally with NODE_OPTIONS=--experimental-vm-modules to reproduce."
